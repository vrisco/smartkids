name = "app"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# Dominio propio: el Worker se sirve en https://app.smart-kids.uk
# Cloudflare provisiona el registro DNS de `app` y el certificado TLS automáticamente.
# (La URL app.smartkids.workers.dev sigue funcionando como respaldo.)
[[routes]]
pattern = "app.smart-kids.uk"
custom_domain = true

# La SPA (build de apps/web) se sirve como Static Assets desde el mismo Worker:
# mismo origen que la API, un solo deploy, sin CORS. Requiere `pnpm --filter @smartkids/web build`.
[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Base de datos D1 (SQLite serverless).
# Para DESARROLLO LOCAL no hace falta el id real: wrangler usa una D1 local en .wrangler/.
# Para producción: `pnpm --filter @smartkids/api exec wrangler d1 create smartkids`
# y pega el database_id aquí.
[[d1_databases]]
binding = "DB"
database_name = "smartkids"
database_id = "a032dbc4-2172-4312-ac1f-01fe79da7b74"
migrations_dir = "migrations"

# Almacenamiento de objetos R2: material subido por los tutores (fotos, PDF, texto) para la Vía B.
# En local, wrangler crea un R2 local en .wrangler/. Bucket creado con:
#   wrangler r2 bucket create smartkids-uploads
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "smartkids-uploads"
